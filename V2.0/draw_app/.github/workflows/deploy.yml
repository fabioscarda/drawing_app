name: Drawing App

on:
  push:
    branches: ["main"]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24 

      - name: Install dependencies
        run: |
          cd V2.0/draw_app
          npm install

      - name: Build
        run: |
          cd V2.0/draw_app
          npm run build

      - name: Upload build
        uses: actions/upload-pages-artifact@v3
        with:
          path: V2.0/draw_app/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/deploy-pages@v4